spring.application.name=settlement-backend
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:settlementdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 Console: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================================
# Claude via AWS Bedrock Converse API
# ===============================================
claude.api.key=${claude_api_key}
claude.api.url=${claude_api} 
claude.api.model=us.anthropic.claude-sonnet-4-6
claude.api.max-tokens=600

# Logging
logging.level.com.lc.settlement=INFO
logging.level.org.springframework.web=INFO
