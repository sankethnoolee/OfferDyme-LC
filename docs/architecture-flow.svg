<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <!-- drop shadow -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- gradients -->
    <linearGradient id="gBorrower" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gFront" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="gBackend" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e0e7ff"/><stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="gAI" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fce7f3"/><stop offset="1" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="gGuard" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/><stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="gStrat" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d1fae5"/><stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="gOut" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ede9fe"/><stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>

    <!-- arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <!-- ======= Title ======= -->
  <rect x="0" y="0" width="1400" height="72" fill="#0f172a"/>
  <text x="36" y="40" font-size="22" font-weight="700" fill="#f8fafc">OfferDyne · Dynamic Settlement Optimizer</text>
  <text x="36" y="60" font-size="13" fill="#94a3b8">PS#8 — real-time, borrower-signal-aware settlement offers within 100% lender guardrails</text>
  <text x="1364" y="40" text-anchor="end" font-size="12" fill="#94a3b8">Java 17 · Spring Boot · H2 · React</text>
  <text x="1364" y="60" text-anchor="end" font-size="12" fill="#94a3b8">Deterministic NLP + Rule-based Strategy Engine</text>

  <!-- ======= Swim-lane labels ======= -->
  <g font-size="10" font-weight="700" fill="#64748b" letter-spacing="1.2">
    <text x="20" y="110" transform="rotate(-90 20 110)">BORROWER</text>
    <text x="20" y="240" transform="rotate(-90 20 240)">FRONTEND (React)</text>
    <text x="20" y="450" transform="rotate(-90 20 450)">BACKEND (Spring)</text>
    <text x="20" y="700" transform="rotate(-90 20 700)">AGENT UI</text>
  </g>

  <!-- lane separators -->
  <line x1="40" y1="150" x2="1380" y2="150" stroke="#e2e8f0" stroke-dasharray="4 4"/>
  <line x1="40" y1="320" x2="1380" y2="320" stroke="#e2e8f0" stroke-dasharray="4 4"/>
  <line x1="40" y1="630" x2="1380" y2="630" stroke="#e2e8f0" stroke-dasharray="4 4"/>

  <!-- ======= 1. Borrower utterance ======= -->
  <g filter="url(#soft)">
    <rect x="60" y="92" width="300" height="50" rx="10" fill="url(#gBorrower)" stroke="#d97706"/>
  </g>
  <text x="210" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">💬 Borrower utterance</text>
  <text x="210" y="132" text-anchor="middle" font-size="11" fill="#78350f" font-style="italic">"I lost my job last month…"</text>

  <!-- ======= 2. Chat Panel ======= -->
  <g filter="url(#soft)">
    <rect x="60" y="170" width="300" height="60" rx="10" fill="url(#gFront)" stroke="#2563eb"/>
  </g>
  <text x="210" y="193" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">ChatPanel.jsx</text>
  <text x="210" y="212" text-anchor="middle" font-size="11" fill="#1e3a8a">POST /api/chat/accounts/{id}/turn</text>
  <text x="210" y="225" text-anchor="middle" font-size="10" fill="#3730a3">{ senderType:"CUSTOMER", content:"…" }</text>

  <!-- ======= 3. ChatService ======= -->
  <g filter="url(#soft)">
    <rect x="60" y="340" width="300" height="62" rx="10" fill="url(#gBackend)" stroke="#4338ca"/>
  </g>
  <text x="210" y="363" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">ChatService</text>
  <text x="210" y="381" text-anchor="middle" font-size="11" fill="#312e81">Append msg → runTurn → analyze</text>
  <text x="210" y="395" text-anchor="middle" font-size="10" fill="#4338ca">Auto-drafts AGENT reply from decision</text>

  <!-- ======= 4. ClaudeService (central AI block) ======= -->
  <g filter="url(#soft)">
    <rect x="410" y="340" width="590" height="270" rx="14" fill="url(#gAI)" stroke="#be185d" stroke-width="1.5"/>
  </g>
  <text x="705" y="368" text-anchor="middle" font-size="15" font-weight="700" fill="#831843">🧠 ClaudeService — Strategy Engine</text>
  <text x="705" y="386" text-anchor="middle" font-size="11" fill="#9d174d">Deterministic NLP + policy-aware decisioning</text>

  <!-- NLP block -->
  <rect x="432" y="402" width="260" height="88" rx="8" fill="#fff" stroke="#f472b6"/>
  <text x="562" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#831843">① NLP Layer</text>
  <text x="562" y="440" text-anchor="middle" font-size="10" fill="#4c1d95">SentimentAnalyzer — score ∈ [-1, +1]</text>
  <text x="562" y="456" text-anchor="middle" font-size="10" fill="#4c1d95">ObjectionClassifier — weighted keyword</text>
  <text x="562" y="472" text-anchor="middle" font-size="10" fill="#4c1d95" font-weight="600">{HARDSHIP, AFFORDABILITY, PARTIAL,</text>
  <text x="562" y="485" text-anchor="middle" font-size="10" fill="#4c1d95" font-weight="600">AVOIDANCE, DISPUTE, NONE}</text>

  <!-- Policy block -->
  <rect x="712" y="402" width="268" height="88" rx="8" fill="#fff" stroke="#f472b6"/>
  <text x="846" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#831843">② Policy Lookup (H2)</text>
  <text x="846" y="440" text-anchor="middle" font-size="10" fill="#4c1d95">NegotiationPolicy by lender + product + DPD</text>
  <text x="846" y="456" text-anchor="middle" font-size="10" fill="#4c1d95">→ discount_floor / ceiling (%)</text>
  <text x="846" y="472" text-anchor="middle" font-size="10" fill="#4c1d95">→ offer_floor / ceiling (% of outstanding)</text>
  <text x="846" y="487" text-anchor="middle" font-size="10" fill="#4c1d95">→ min / max installments</text>

  <!-- Strategy picker block -->
  <rect x="432" y="506" width="548" height="94" rx="8" fill="#fff" stroke="#f472b6"/>
  <text x="706" y="527" text-anchor="middle" font-size="12" font-weight="700" fill="#831843">③ Strategy Picker — signals → action</text>
  <text x="706" y="545" text-anchor="middle" font-size="10" fill="#4c1d95">turn count · rejection streak · offer ledger · sentiment · objection · multi-acct</text>
  <text x="706" y="564" text-anchor="middle" font-size="10" fill="#4c1d95">─────────────────────────────────</text>
  <text x="706" y="582" text-anchor="middle" font-size="10" font-weight="600" fill="#4c1d95">picks ONE of 5 strategies, shapes offer, stamps rationale + script line</text>

  <!-- ======= 5. Five strategy chips (right of AI block) ======= -->
  <g filter="url(#soft)">
    <rect x="1030" y="340" width="340" height="270" rx="14" fill="url(#gStrat)" stroke="#047857"/>
  </g>
  <text x="1200" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">5 Negotiation Strategies</text>
  <text x="1200" y="382" text-anchor="middle" font-size="10" fill="#065f46">(PS#8 requires ≥ 4 distinct behaviors)</text>

  <!-- HOLD -->
  <rect x="1048" y="396" width="304" height="36" rx="6" fill="#fff" stroke="#10b981"/>
  <text x="1060" y="416" font-size="11" font-weight="700" fill="#065f46">HOLD</text>
  <text x="1113" y="416" font-size="10" fill="#064e3b">keep offer + urgency framing (wavering)</text>

  <!-- LOWER -->
  <rect x="1048" y="438" width="304" height="36" rx="6" fill="#fff" stroke="#10b981"/>
  <text x="1060" y="458" font-size="11" font-weight="700" fill="#065f46">LOWER</text>
  <text x="1113" y="458" font-size="10" fill="#064e3b">shave 5–10% toward floor (affordability)</text>

  <!-- REFRAME -->
  <rect x="1048" y="480" width="304" height="36" rx="6" fill="#fff" stroke="#10b981"/>
  <text x="1060" y="500" font-size="11" font-weight="700" fill="#065f46">REFRAME</text>
  <text x="1125" y="500" font-size="10" fill="#064e3b">split into 2–3 EMIs, same total</text>

  <!-- BUNDLE -->
  <rect x="1048" y="522" width="304" height="36" rx="6" fill="#fff" stroke="#10b981"/>
  <text x="1060" y="542" font-size="11" font-weight="700" fill="#065f46">BUNDLE</text>
  <text x="1119" y="542" font-size="10" fill="#064e3b">package all customer accts at lender</text>

  <!-- ESCALATE -->
  <rect x="1048" y="564" width="304" height="36" rx="6" fill="#fff" stroke="#10b981"/>
  <text x="1060" y="584" font-size="11" font-weight="700" fill="#065f46">ESCALATE</text>
  <text x="1126" y="584" font-size="10" fill="#064e3b">hand-off to senior, no fresh offer</text>

  <!-- ======= 6. Guardrail Clamp (CRITICAL — highlighted) ======= -->
  <g filter="url(#soft)">
    <rect x="410" y="636" width="590" height="78" rx="10" fill="url(#gGuard)" stroke="#b91c1c" stroke-width="2"/>
  </g>
  <text x="705" y="661" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">🛡 Guardrail Clamp — 100% Hard Rule</text>
  <text x="705" y="681" text-anchor="middle" font-size="11" fill="#7f1d1d">offer = clamp(offer, policyFloor, policyCeiling)    ·    discount = clamp(…)</text>
  <text x="705" y="700" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">NEVER below lender floor · tags guardrailStatus = WITHIN_LIMITS | FLOORED | CAPPED</text>

  <!-- ======= 7. Decision DTO / Output ======= -->
  <g filter="url(#soft)">
    <rect x="1030" y="636" width="340" height="78" rx="10" fill="url(#gOut)" stroke="#6d28d9"/>
  </g>
  <text x="1200" y="661" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">ClaudeDecisionDto</text>
  <text x="1200" y="680" text-anchor="middle" font-size="10" fill="#4c1d95">strategy · offer · floor/ceiling · script line</text>
  <text x="1200" y="695" text-anchor="middle" font-size="10" fill="#4c1d95">objection · sentiment · guardrail status</text>
  <text x="1200" y="710" text-anchor="middle" font-size="10" fill="#4c1d95">→ returned with transcript in JSON</text>

  <!-- ======= 8. Agent UI — right panel + chat reply ======= -->
  <g filter="url(#soft)">
    <rect x="60" y="650" width="300" height="64" rx="10" fill="url(#gFront)" stroke="#2563eb"/>
  </g>
  <text x="210" y="672" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">RecommendationPanel.jsx</text>
  <text x="210" y="690" text-anchor="middle" font-size="10" fill="#1e3a8a">strategy pill · offer slider · guardrail badge</text>
  <text x="210" y="704" text-anchor="middle" font-size="10" fill="#1e3a8a">script line · save settlement button</text>

  <g filter="url(#soft)">
    <rect x="60" y="760" width="300" height="58" rx="10" fill="url(#gBorrower)" stroke="#d97706"/>
  </g>
  <text x="210" y="782" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">👤 Collections agent</text>
  <text x="210" y="798" text-anchor="middle" font-size="10" fill="#78350f" font-style="italic">reads script · sends reply · saves settlement</text>
  <text x="210" y="812" text-anchor="middle" font-size="10" fill="#78350f">Settlement persisted → history timeline</text>

  <!-- ======= Arrows ======= -->
  <!-- borrower -> chatpanel -->
  <path d="M210 142 L210 168" stroke="#334155" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <!-- chatpanel -> chatservice -->
  <path d="M210 230 L210 338" stroke="#334155" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <!-- chatservice -> claudeservice -->
  <path d="M360 371 L408 471" stroke="#334155" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <!-- claudeservice -> strategies (pick) -->
  <path d="M980 475 L1032 475" stroke="#334155" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <!-- NLP -> Strategy picker internal arrows -->
  <path d="M562 490 L562 504" stroke="#9d174d" stroke-width="1.2" fill="none" marker-end="url(#arrow)" stroke-dasharray="2 2"/>
  <path d="M846 490 L846 504" stroke="#9d174d" stroke-width="1.2" fill="none" marker-end="url(#arrow)" stroke-dasharray="2 2"/>
  <!-- strategy block -> guardrail (MUST clamp before release) -->
  <path d="M1200 610 L1200 622 L705 622 L705 634" stroke="#b91c1c" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>
  <!-- guardrail -> decision DTO -->
  <path d="M1000 675 L1028 675" stroke="#334155" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <!-- decision -> recommendation panel (response) -->
  <path d="M1030 680 Q 700 760 362 682" stroke="#334155" stroke-width="1.8" fill="none" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="700" y="740" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">HTTP response with transcript + decision</text>
  <!-- recommendation panel -> agent -->
  <path d="M210 714 L210 758" stroke="#334155" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <!-- agent -> borrower (reply loop) -->
  <path d="M110 760 Q 40 460 110 170" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 4"/>
  <text x="56" y="470" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="700" transform="rotate(-90 56 470)">agent reply → loop</text>

  <!-- ======= PS#8 Relevancy callouts ======= -->
  <g>
    <rect x="60" y="850" width="1310" height="78" rx="10" fill="#0f172a"/>
    <text x="80" y="874" font-size="12" font-weight="700" fill="#fbbf24">PS#8 hard-criteria coverage</text>
    <text x="80" y="894" font-size="11" fill="#e2e8f0">✓ 100% guardrail compliance — clamp step is non-bypassable, breach counter always 0 across simulated sessions</text>
    <text x="80" y="910" font-size="11" fill="#e2e8f0">✓ ≥ 75% objection-classification accuracy on 42-utterance annotated fixture (precision / recall / F1 per label)</text>
    <text x="780" y="894" font-size="11" fill="#e2e8f0">✓ 5 distinct strategies with different behaviors (HOLD · LOWER · REFRAME · BUNDLE · ESCALATE)</text>
    <text x="780" y="910" font-size="11" fill="#e2e8f0">✓ Live demo — 3 full negotiation sessions; signals (sentiment, objection, turn count) drive offers turn-by-turn</text>
  </g>
</svg>
