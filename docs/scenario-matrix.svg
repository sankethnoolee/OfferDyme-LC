<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- row tints -->
    <linearGradient id="rowA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef9c3"/><stop offset="1" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="rowB" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="rowC" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d1fae5"/><stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="rowD" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ede9fe"/><stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="rowE" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/><stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <!-- Title bar -->
  <rect x="0" y="0" width="1400" height="72" fill="#0f172a"/>
  <text x="36" y="40" font-size="22" font-weight="700" fill="#f8fafc">OfferDyne · Scenario → Strategy → Output Matrix</text>
  <text x="36" y="60" font-size="13" fill="#94a3b8">PS#8 — same outstanding, different borrower signals, different offers. Dynamic negotiation in action.</text>
  <text x="1364" y="40" text-anchor="end" font-size="12" fill="#94a3b8">5 scenarios · 5 strategies · 100% within floor/ceiling</text>
  <text x="1364" y="60" text-anchor="end" font-size="12" fill="#94a3b8">Base case: LC-PL-10001 · ₹3,12,400 outstanding · DPD_60</text>

  <!-- Column headers -->
  <g>
    <rect x="20" y="88" width="1360" height="40" rx="6" fill="#1e293b"/>
    <text x="40"   y="112" font-size="11" font-weight="700" fill="#cbd5e1">#</text>
    <text x="75"   y="112" font-size="11" font-weight="700" fill="#cbd5e1">BORROWER UTTERANCE (INPUT)</text>
    <text x="370"  y="112" font-size="11" font-weight="700" fill="#cbd5e1">DETECTED SIGNALS</text>
    <text x="620"  y="112" font-size="11" font-weight="700" fill="#cbd5e1">STRATEGY</text>
    <text x="810"  y="112" font-size="11" font-weight="700" fill="#cbd5e1">OFFER SHAPE</text>
    <text x="1015" y="112" font-size="11" font-weight="700" fill="#cbd5e1">AGENT SCRIPT LINE</text>
    <text x="1295" y="112" font-size="11" font-weight="700" fill="#cbd5e1">GUARDRAIL</text>
  </g>

  <!-- ======================================================
       Row 1 — HARDSHIP → LOWER
       ====================================================== -->
  <g filter="url(#soft)">
    <rect x="20" y="136" width="1360" height="130" rx="8" fill="url(#rowA)" stroke="#ca8a04"/>
  </g>
  <!-- # -->
  <text x="40" y="173" font-size="20" font-weight="700" fill="#713f12">1</text>
  <text x="34" y="192" font-size="9" fill="#854d0e">SCENARIO</text>
  <!-- Utterance -->
  <text x="75" y="170" font-size="12" font-weight="600" fill="#78350f">Hardship — job loss</text>
  <text x="75" y="196" font-size="12" fill="#422006" font-style="italic">"I lost my job last month.</text>
  <text x="75" y="213" font-size="12" fill="#422006" font-style="italic">I just can't pay this amount right now."</text>
  <text x="75" y="245" font-size="10" fill="#92400e">Turn #2 · 1 prior rejection</text>
  <!-- Signals -->
  <rect x="370" y="155" width="145" height="22" rx="11" fill="#fee2e2" stroke="#ef4444"/>
  <text x="442" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">🆘 HARDSHIP · 89%</text>
  <rect x="370" y="184" width="145" height="22" rx="11" fill="#fecaca" stroke="#dc2626"/>
  <text x="442" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">NEGATIVE · −0.55</text>
  <text x="370" y="230" font-size="10" fill="#78350f">Rejection streak: 1</text>
  <text x="370" y="246" font-size="10" fill="#78350f">Prior offer: ₹2,56,168</text>
  <!-- Strategy -->
  <rect x="620" y="170" width="170" height="38" rx="19" fill="#10b981"/>
  <text x="705" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">LOWER</text>
  <text x="620" y="225" font-size="10" fill="#064e3b">Shave ~8% toward floor;</text>
  <text x="620" y="240" font-size="10" fill="#064e3b">present as final & manager-signed</text>
  <!-- Offer shape -->
  <text x="810" y="168" font-size="11" font-weight="700" fill="#064e3b">Discount ↑  25%  (was 18%)</text>
  <text x="810" y="188" font-size="15" font-weight="700" fill="#065f46">₹2,34,300</text>
  <text x="810" y="203" font-size="9" fill="#047857">ONE_TIME  ·  ≤ 45 days</text>
  <text x="810" y="225" font-size="9" fill="#065f46">Floor: 15%  Ceiling: 35%</text>
  <text x="810" y="240" font-size="9" fill="#065f46">(LC Bank · PL · DPD_60)</text>
  <!-- Script -->
  <text x="1015" y="170" font-size="11" fill="#1e293b" font-style="italic">"Given you've just restarted earning,</text>
  <text x="1015" y="187" font-size="11" fill="#1e293b" font-style="italic">I've got one-time approval for 25%</text>
  <text x="1015" y="204" font-size="11" fill="#1e293b" font-style="italic">off — ₹2.34L closes this. Valid 72h."</text>
  <text x="1015" y="235" font-size="9" fill="#475569">Empathy → anchor → time-box</text>
  <!-- Guardrail -->
  <rect x="1250" y="185" width="120" height="26" rx="13" fill="#10b981"/>
  <text x="1310" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">WITHIN LIMITS</text>
  <text x="1310" y="230" text-anchor="middle" font-size="9" fill="#065f46">floor 15% &lt; 25% &lt; 35% ceil</text>

  <!-- ======================================================
       Row 2 — PARTIAL_WILLINGNESS → REFRAME_INSTALLMENTS
       ====================================================== -->
  <g filter="url(#soft)">
    <rect x="20" y="274" width="1360" height="130" rx="8" fill="url(#rowB)" stroke="#2563eb"/>
  </g>
  <text x="40" y="311" font-size="20" font-weight="700" fill="#1e3a8a">2</text>
  <text x="34" y="330" font-size="9" fill="#1e40af">SCENARIO</text>
  <text x="75" y="308" font-size="12" font-weight="600" fill="#1e3a8a">Partial willingness — cashflow</text>
  <text x="75" y="334" font-size="12" fill="#0f172a" font-style="italic">"I can pay, just not everything right now.</text>
  <text x="75" y="351" font-size="12" fill="#0f172a" font-style="italic">Can we split it over a couple of months?"</text>
  <text x="75" y="383" font-size="10" fill="#1e40af">Turn #3 · lump-sum rejected</text>
  <rect x="370" y="293" width="145" height="22" rx="11" fill="#d1fae5" stroke="#10b981"/>
  <text x="442" y="308" text-anchor="middle" font-size="10" font-weight="700" fill="#064e3b">🤝 PARTIAL · 82%</text>
  <rect x="370" y="322" width="145" height="22" rx="11" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="442" y="337" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">NEUTRAL · +0.10</text>
  <text x="370" y="368" font-size="10" fill="#1e40af">Keyword match: "split"</text>
  <text x="370" y="384" font-size="10" fill="#1e40af">Prior offer: ₹2,49,920 lump</text>
  <rect x="620" y="308" width="170" height="38" rx="19" fill="#8b5cf6"/>
  <text x="705" y="333" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">REFRAME</text>
  <text x="620" y="363" font-size="10" fill="#4c1d95">Same total, split into 2–3 EMIs</text>
  <text x="620" y="378" font-size="10" fill="#4c1d95">within policy min/max range</text>
  <text x="810" y="306" font-size="11" font-weight="700" fill="#4c1d95">Discount  20%  (held)</text>
  <text x="810" y="326" font-size="15" font-weight="700" fill="#5b21b6">₹2,49,920 / 3</text>
  <text x="810" y="341" font-size="9" fill="#6d28d9">EMI_3  ·  ₹83,307 × 3 months</text>
  <text x="810" y="363" font-size="9" fill="#4c1d95">Installments allowed: 1–6</text>
  <text x="810" y="378" font-size="9" fill="#4c1d95">(LC DPD_60 policy)</text>
  <text x="1015" y="308" font-size="11" fill="#1e293b" font-style="italic">"Makes sense — let's make it three</text>
  <text x="1015" y="325" font-size="11" fill="#1e293b" font-style="italic">easy EMIs of ₹83,307 starting next</text>
  <text x="1015" y="342" font-size="11" fill="#1e293b" font-style="italic">month. Total unchanged, closure in Q3."</text>
  <text x="1015" y="373" font-size="9" fill="#475569">Honour willingness → reshape, don't re-price</text>
  <rect x="1250" y="323" width="120" height="26" rx="13" fill="#10b981"/>
  <text x="1310" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">WITHIN LIMITS</text>
  <text x="1310" y="368" text-anchor="middle" font-size="9" fill="#1e3a8a">3 EMIs ∈ [1, 6] policy</text>

  <!-- ======================================================
       Row 3 — AFFORDABILITY wavering → HOLD
       ====================================================== -->
  <g filter="url(#soft)">
    <rect x="20" y="412" width="1360" height="130" rx="8" fill="url(#rowC)" stroke="#047857"/>
  </g>
  <text x="40" y="449" font-size="20" font-weight="700" fill="#064e3b">3</text>
  <text x="34" y="468" font-size="9" fill="#065f46">SCENARIO</text>
  <text x="75" y="446" font-size="12" font-weight="600" fill="#064e3b">Wavering — weak objection</text>
  <text x="75" y="472" font-size="12" fill="#0f172a" font-style="italic">"Hmm, that's still a lot…</text>
  <text x="75" y="489" font-size="12" fill="#0f172a" font-style="italic">let me think about it."</text>
  <text x="75" y="521" font-size="10" fill="#065f46">Turn #2 · offer not yet rejected</text>
  <rect x="370" y="431" width="145" height="22" rx="11" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="442" y="446" text-anchor="middle" font-size="10" font-weight="700" fill="#78350f">💸 AFFORDABILITY · 58%</text>
  <rect x="370" y="460" width="145" height="22" rx="11" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="442" y="475" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">NEUTRAL · −0.15</text>
  <text x="370" y="506" font-size="10" fill="#065f46">No explicit rejection</text>
  <text x="370" y="522" font-size="10" fill="#065f46">Prior offer: ₹2,56,168</text>
  <rect x="620" y="446" width="170" height="38" rx="19" fill="#f59e0b"/>
  <text x="705" y="471" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">HOLD</text>
  <text x="620" y="501" font-size="10" fill="#78350f">Keep price, reinforce urgency;</text>
  <text x="620" y="516" font-size="10" fill="#78350f">dropping now teaches rejection</text>
  <text x="810" y="444" font-size="11" font-weight="700" fill="#78350f">Discount  18%  (unchanged)</text>
  <text x="810" y="464" font-size="15" font-weight="700" fill="#92400e">₹2,56,168</text>
  <text x="810" y="479" font-size="9" fill="#b45309">ONE_TIME  ·  hold position</text>
  <text x="810" y="501" font-size="9" fill="#78350f">No movement vs prior turn</text>
  <text x="810" y="516" font-size="9" fill="#78350f">(offer ledger unchanged)</text>
  <text x="1015" y="446" font-size="11" fill="#1e293b" font-style="italic">"Take your time — but this waiver</text>
  <text x="1015" y="463" font-size="11" fill="#1e293b" font-style="italic">was cleared only for today. After 6pm</text>
  <text x="1015" y="480" font-size="11" fill="#1e293b" font-style="italic">it reverts to the standard ₹3.12L."</text>
  <text x="1015" y="511" font-size="9" fill="#475569">Urgency framing, no price concession</text>
  <rect x="1250" y="461" width="120" height="26" rx="13" fill="#10b981"/>
  <text x="1310" y="478" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">WITHIN LIMITS</text>
  <text x="1310" y="506" text-anchor="middle" font-size="9" fill="#065f46">no change to prior band</text>

  <!-- ======================================================
       Row 4 — Multi-account → BUNDLE
       ====================================================== -->
  <g filter="url(#soft)">
    <rect x="20" y="550" width="1360" height="130" rx="8" fill="url(#rowD)" stroke="#6d28d9"/>
  </g>
  <text x="40" y="587" font-size="20" font-weight="700" fill="#4c1d95">4</text>
  <text x="34" y="606" font-size="9" fill="#5b21b6">SCENARIO</text>
  <text x="75" y="584" font-size="12" font-weight="600" fill="#4c1d95">Portfolio — multi-account</text>
  <text x="75" y="610" font-size="12" fill="#0f172a" font-style="italic">"I have three loans with HDFC, why</text>
  <text x="75" y="627" font-size="12" fill="#0f172a" font-style="italic">are you only talking about one?"</text>
  <text x="75" y="659" font-size="10" fill="#5b21b6">Customer-scope transcript opened</text>
  <rect x="370" y="569" width="145" height="22" rx="11" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="442" y="584" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">NONE · multi-acct signal</text>
  <rect x="370" y="598" width="145" height="22" rx="11" fill="#e5e7eb" stroke="#6b7280"/>
  <text x="442" y="613" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">NEUTRAL · +0.05</text>
  <text x="370" y="644" font-size="10" fill="#5b21b6">2 HDFC accts eligible</text>
  <text x="370" y="660" font-size="10" fill="#5b21b6">HDFC-CC + HDFC-PL</text>
  <rect x="620" y="584" width="170" height="38" rx="19" fill="#ea580c"/>
  <text x="705" y="609" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">BUNDLE</text>
  <text x="620" y="639" font-size="10" fill="#78350f">Aggregate outstanding, blended</text>
  <text x="620" y="654" font-size="10" fill="#78350f">discount, all-or-nothing closure</text>
  <text x="810" y="582" font-size="11" font-weight="700" fill="#4c1d95">Blended  30% over ₹9.27L</text>
  <text x="810" y="602" font-size="15" font-weight="700" fill="#5b21b6">₹6,49,110</text>
  <text x="810" y="617" font-size="9" fill="#6d28d9">EMI_6  ·  across 6 months</text>
  <text x="810" y="639" font-size="9" fill="#4c1d95">HDFC NPA ceiling: 45%</text>
  <text x="810" y="654" font-size="9" fill="#4c1d95">Linked accts: 6, 7</text>
  <text x="1015" y="582" font-size="11" fill="#1e293b" font-style="italic">"Good point — let's close all three</text>
  <text x="1015" y="599" font-size="11" fill="#1e293b" font-style="italic">HDFC accounts together: 30% off the</text>
  <text x="1015" y="616" font-size="11" fill="#1e293b" font-style="italic">full ₹9.27L, payable in 6 EMIs."</text>
  <text x="1015" y="647" font-size="9" fill="#475569">Reframe per-account → portfolio deal</text>
  <rect x="1250" y="599" width="120" height="26" rx="13" fill="#10b981"/>
  <text x="1310" y="616" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">WITHIN LIMITS</text>
  <text x="1310" y="644" text-anchor="middle" font-size="9" fill="#4c1d95">blended ≤ worst-ceil policy</text>

  <!-- ======================================================
       Row 5 — DISPUTE / persistent rejection → ESCALATE
       ====================================================== -->
  <g filter="url(#soft)">
    <rect x="20" y="688" width="1360" height="130" rx="8" fill="url(#rowE)" stroke="#b91c1c"/>
  </g>
  <text x="40" y="725" font-size="20" font-weight="700" fill="#7f1d1d">5</text>
  <text x="34" y="744" font-size="9" fill="#991b1b">SCENARIO</text>
  <text x="75" y="722" font-size="12" font-weight="600" fill="#7f1d1d">Dispute — floor attack</text>
  <text x="75" y="748" font-size="12" fill="#0f172a" font-style="italic">"I don't owe this — I already paid!</text>
  <text x="75" y="765" font-size="12" fill="#0f172a" font-style="italic">Stop calling or I'll go to court."</text>
  <text x="75" y="797" font-size="10" fill="#991b1b">Turn #5 · 3 rejections at floor</text>
  <rect x="370" y="707" width="145" height="22" rx="11" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="442" y="722" text-anchor="middle" font-size="10" font-weight="700" fill="#4c1d95">⚠️ DISPUTE · 76%</text>
  <rect x="370" y="736" width="145" height="22" rx="11" fill="#fecaca" stroke="#dc2626"/>
  <text x="442" y="751" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">NEGATIVE · −0.48</text>
  <text x="370" y="782" font-size="10" fill="#991b1b">Offer ledger at floor for 3 turns</text>
  <text x="370" y="798" font-size="10" fill="#991b1b">Further movement ≠ defensible</text>
  <rect x="620" y="722" width="170" height="38" rx="19" fill="#b91c1c"/>
  <text x="705" y="747" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">ESCALATE</text>
  <text x="620" y="777" font-size="10" fill="#7f1d1d">Hand off to senior / grievance,</text>
  <text x="620" y="792" font-size="10" fill="#7f1d1d">NO fresh price move</text>
  <text x="810" y="720" font-size="11" font-weight="700" fill="#7f1d1d">shouldOfferSettlement: FALSE</text>
  <text x="810" y="740" font-size="14" font-weight="700" fill="#991b1b">— no new offer —</text>
  <text x="810" y="758" font-size="9" fill="#b91c1c">Settlement save button disabled</text>
  <text x="810" y="779" font-size="9" fill="#7f1d1d">Floor NEVER breached despite</text>
  <text x="810" y="794" font-size="9" fill="#7f1d1d">persistent judge rejection</text>
  <text x="1015" y="720" font-size="11" fill="#1e293b" font-style="italic">"I hear you — let me route this to our</text>
  <text x="1015" y="737" font-size="11" fill="#1e293b" font-style="italic">grievance team with your payment</text>
  <text x="1015" y="754" font-size="11" fill="#1e293b" font-style="italic">proof. They'll call you in 24 hours."</text>
  <text x="1015" y="785" font-size="9" fill="#475569">De-escalate → process exit, not price exit</text>
  <rect x="1250" y="737" width="120" height="26" rx="13" fill="#10b981"/>
  <text x="1310" y="754" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">WITHIN LIMITS</text>
  <text x="1310" y="782" text-anchor="middle" font-size="9" fill="#7f1d1d">guardrail held at floor</text>

  <!-- Footer strip — the PS#8 hook line -->
  <rect x="20" y="838" width="1360" height="92" rx="10" fill="#0f172a"/>
  <text x="40" y="866" font-size="13" font-weight="700" fill="#fbbf24">Why this is PS#8's "dynamic negotiation" in action</text>
  <text x="40" y="888" font-size="11" fill="#e2e8f0">Same base account (LC-PL-10001 · ₹3.12L · DPD_60) — yet every row produces a <tspan font-style="italic">different</tspan> offer because the borrower <tspan font-weight="700">signal</tspan> is different.</text>
  <text x="40" y="906" font-size="11" fill="#e2e8f0">The brief's own test sentence — "<tspan font-style="italic">I lost my job</tspan>" vs "<tspan font-style="italic">I can pay, just not everything</tspan>" — maps to rows 1 vs 2: LOWER vs REFRAME, not the same price.</text>
  <text x="40" y="924" font-size="11" fill="#e2e8f0">Row 5 is the judge-attack case: 3 rejections at floor do <tspan font-weight="700">not</tspan> force a breach — the system picks ESCALATE instead. 100% guardrail compliance proved on the hardest path.</text>
</svg>
